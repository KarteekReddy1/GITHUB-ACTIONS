name: "created using composite actions"
description: "this workflow is created using composite actions"

inputs:
  AWS_ACCESS_KEY_ID:
    description: "aws-access-key-id"
    required: true
  AWS_SECRET_ACCESS_KEY:
    description: "aws-secret-access-key"
    required: true
  AWS_DEFAULT_REGION: 
    description: "aws-region"
    required: true
runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4
    - uses: hashicorp/setup-terraform@v2
    - name: Set AWS Credentials
      run: |
        echo "AWS_ACCESS_KEY_ID=${{ inputs.AWS_ACCESS_KEY_I }}" >> $GITHUB_ENV
        echo "AWS_SECRET_ACCESS_KEY=${{ inputs.AWS_SECRET_ACCESS_KE }}" >> $GITHUB_ENV
        echo "AWS_DEFAULT_REGION=${{ inputs.AWS_DEFAULT_REGIO }}" >> $GITHUB_ENV
      shell: bash
    - run: terraform init
      shell: bash
    
    - run: terraform validate
      shell: bash
    - run: terraform fmt -check
      shell: bash

    - run: terraform plan
      shell: bash

    - run: terraform apply -auto-approve
      shell: bash



