name: "AWS EC2 with Terraform"
description: "Provision EC2 using Terraform via composite action"

inputs:
  AWS_ACCESS_KEY_ID:
    description: "AWS Access Key ID"
    required: true
  AWS_SECRET_ACCESS_KEY:
    description: "AWS Secret Access Key"
    required: true
  AWS_DEFAULT_REGION:
    description: "AWS Default Region"
    required: true

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4

    - uses: hashicorp/setup-terraform@v2

    - name: Set AWS Credentials
      shell: bash
      run: |
        echo "AWS_ACCESS_KEY_ID=${{ inputs.AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
        echo "AWS_SECRET_ACCESS_KEY=${{ inputs.AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
        echo "AWS_DEFAULT_REGION=${{ inputs.AWS_DEFAULT_REGION }}" >> $GITHUB_ENV

    - name: Terraform Init
      shell: bash
      run: terraform init

    - name: Terraform Validate
      shell: bash
      run: terraform validate

    - name: Terraform Format Check
      shell: bash
      run: terraform fmt -check

    - name: Terraform Plan
      shell: bash
      run: terraform plan

    - name: Terraform Apply
      shell: bash
      run: terraform apply -auto-approve
